<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VFSA Dashboard · Sign in</title>
  <meta name="robots" content="noindex,nofollow" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --navy:#0f2c4a; --blue:#1d4d8c; --red:#b91c1c; --gold:#d4a017; }
    body { background:#f4f6fb; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <form id="login-form" class="w-full max-w-sm bg-white rounded-xl shadow-sm border border-slate-200 p-8">
    <div class="flex items-center gap-3 mb-6">
      <span class="h-10 w-10 rounded-md" style="background: linear-gradient(135deg, var(--navy), var(--blue));"></span>
      <div>
        <h1 class="text-lg font-semibold leading-tight">VFSA Dashboard</h1>
        <p class="text-xs text-slate-500">HB 6 Impact Survey</p>
      </div>
    </div>
    <label class="block text-sm font-medium mb-1" for="password">Dashboard password</label>
    <input
      id="password" type="password" required autocomplete="current-password"
      class="w-full rounded-md border border-slate-300 px-3 py-2 text-base shadow-sm focus:border-[color:var(--blue)] focus:outline-none"
    />
    <button type="submit"
      class="mt-4 w-full rounded-md px-4 py-2 text-white font-semibold"
      style="background-color: var(--blue);"
    >Sign in</button>
    <p id="err" class="mt-3 text-sm text-red-700 hidden">Incorrect password. Try again.</p>
  </form>

  <script>
    const form = document.getElementById("login-form");
    const err = document.getElementById("err");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.classList.add("hidden");
      const password = document.getElementById("password").value;
      try {
        const res = await fetch("/dashboard/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
          credentials: "same-origin",
        });
        if (!res.ok) throw new Error("bad");
        window.location.href = "/dashboard";
      } catch {
        err.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
